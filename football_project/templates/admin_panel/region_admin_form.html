{% extends 'admin_panel/base.html' %}
{% block admin_content %}
<div class="admin-list-header"><h2>{{ title }}</h2><a href="{% url 'core:admin_region_admins' %}" class="btn btn-secondary">&#8592; Orqaga</a></div>
<div class="admin-form-card"><form method="post">{% csrf_token %}
<div class="form-group"><label>Login</label><input type="text" name="username" class="form-input" required></div>
<div class="form-group"><label>Parol</label><input type="password" name="password" class="form-input" required></div>
{% for field in form %}<div class="form-group"><label>{{ field.label }}</label>{{ field }}{% if field.errors %}<small style="color:#dc2626">{{ field.errors.0 }}</small>{% endif %}</div>{% endfor %}
<button type="submit" class="btn btn-primary">&#10004; Tayinlash</button></form></div>{% endblock %}
