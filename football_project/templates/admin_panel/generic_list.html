{% extends 'admin_panel/base.html' %}
{% block admin_content %}
<div class="admin-list-header"><h2>{{ title }}</h2><a href="{% url create_url %}" class="btn btn-primary">&#10010; Qo'shish</a></div>
<div class="table-wrapper"><table><thead><tr><th>Nomi</th><th>Amallar</th></tr></thead><tbody>
{% for item in items %}<tr><td><strong>{{ item }}</strong></td><td><a href="{% url edit_url item.pk %}" class="btn btn-sm btn-secondary">&#9998;</a> <form method="post" action="{% url delete_url item.pk %}" style="display:inline" onsubmit="return confirm('?')">{% csrf_token %}<button class="btn btn-sm btn-danger">&#128465;</button></form></td></tr>
{% empty %}<tr><td colspan="2" class="text-center" style="padding:2rem;color:var(--gray-400)">Yo'q</td></tr>{% endfor %}
</tbody></table></div>{% endblock %}
